{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Login</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button" type="submit">Login</button>
  </form>
  <p>New here? <a href="{% url 'register' %}">Create an account</a>.</p>
  <p class="muted">Demo account: <strong>demo_student</strong> / <strong>Demo@12345</strong></p>
</section>
{% endblock %}
