services:
  - type: web
    name: schemesetu
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn scholarship_site.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://schemesetu.onrender.com"
